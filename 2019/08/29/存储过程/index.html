            <h1 id="触发器"><a href="#触发器" class="headerlink" title="触发器"></a>触发器</h1><h2 id="创建只有一个执行语句的触发器"><a href="#创建只有一个执行语句的触发器" class="headerlink" title="创建只有一个执行语句的触发器"></a>创建只有一个执行语句的触发器</h2><img src="/2019/08/29/存储过程/20180717141713856.png" alt="logo">

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br></pre></td><td class="code"><pre><span class="line">--案例一</span><br><span class="line">create or replace trigger trig_up_user</span><br><span class="line">  after insert on USER_ZHANG</span><br><span class="line">  for each row</span><br><span class="line">begin</span><br><span class="line">  update USER_TYPE set STATIC = &apos;QWE&apos; where ID = &apos;1&apos;;</span><br><span class="line">  --update USER_ZHANG set USERNAME=&apos;wef&apos; where password=&apos;zsc&apos;;</span><br><span class="line">end;</span><br><span class="line"></span><br><span class="line">--案例二</span><br><span class="line">CREATE OR REPLACE TRIGGER TRIG_UPDATE_MATERIAL</span><br><span class="line">  BEFORE UPDATE ON MATERIAL</span><br><span class="line">  FOR EACH ROW</span><br><span class="line"></span><br><span class="line">declare</span><br><span class="line">begin</span><br><span class="line">  verify_field_dict(&apos;MATERIAL&apos;,</span><br><span class="line">                    &apos;ATTRIBUTE1&apos;,</span><br><span class="line">                    :new.attribute1,</span><br><span class="line">                    &apos;物资有效标志&apos;);</span><br><span class="line">  if :old.attribute1 = &apos;DISABLED&apos; and :new.attribute1 = &apos;DISABLED&apos; then</span><br><span class="line">    raise_application_error(-20001, &apos;该物资已经禁止使用,不能修改&apos;);</span><br><span class="line">  end if;</span><br><span class="line">  if :new.name is null then</span><br><span class="line">    raise_application_error(-20001, &apos;名字不能为空.;&apos;);</span><br><span class="line">  end if;</span><br><span class="line">  if substrb(user, 3, 5) &lt;&gt; &apos;00100&apos; and :new.name &lt;&gt; :old.name then</span><br><span class="line">    raise_application_error(-20001, &apos;名字不能修改.;&apos;);</span><br><span class="line">  end if;</span><br><span class="line"></span><br><span class="line">  if substrb(:new.attribute, 10, 1) = &apos;A&apos; then</span><br><span class="line">    verify_account_subject(:new.account_subjectid);</span><br><span class="line">  end if;</span><br><span class="line">  if :new.id = :new.parentid then</span><br><span class="line">    raise_application_error(-20001, &apos;上级项目编号不能是自己;&apos;);</span><br><span class="line">  end if;</span><br><span class="line">end;</span><br></pre></td></tr></table></figure>

<p>*代码解释</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">:new --为一个引用最新的列值;</span><br><span class="line">:old --为一个引用以前的列值; </span><br><span class="line">--这两个变量只有在使用了关键字 &quot;FOR EACH ROW&quot;时才存在.</span><br><span class="line">--且update语句两个都有,</span><br><span class="line">--而insert只有:new ,</span><br><span class="line">--delect 只有:old;</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br></pre></td><td class="code"><pre><span class="line">create or replace trigger JBPM.TIB_DEPLOYBYMOVEPAPER before --before表示在操作完成前触发, after表示在完成后触发</span><br><span class="line">insert --发生插入数据操作触发</span><br><span class="line">on JBPM.DEPLOYBYMOVEPAPER for each row --指定触发器每行触发一次</span><br><span class="line">declare</span><br><span class="line">    integrity_error exception; --用户自定义错误</span><br><span class="line">    errno            integer;</span><br><span class="line">    errmsg           char(200);</span><br><span class="line">    dummy            integer;</span><br><span class="line">    found            boolean;</span><br><span class="line">    row_count         number;</span><br><span class="line">    max_num deploybymovepaper.num%type; --根据表的字段定义变量类型</span><br><span class="line">    zero_today deploybymovepaper.num%type;</span><br><span class="line"></span><br><span class="line">begin</span><br><span class="line">-- Column &quot;ID&quot; uses sequence SEQUENCE_38</span><br><span class="line">case</span><br><span class="line">when inserting then --SQL语句只能使用:new特殊变量</span><br><span class="line">select SEQUENCE_38.NEXTVAL INTO :new.ID from dual;--主键自增</span><br><span class="line">zero_today :=&apos;0391&apos;||to_char(sysdate,&apos;yymmdd&apos;)||lpad(to_char(0),4,&apos;0&apos;);--lpad函数定义字符串长度为4不足时用0补全</span><br><span class="line">    select count(*) into row_count from deploybymovepaper;</span><br><span class="line">    if row_count = 0 then</span><br><span class="line">        max_num:=zero_today;--:=给变量赋值</span><br><span class="line">    else</span><br><span class="line">      select max(num) into max_num from deploybymovepaper;</span><br><span class="line">    end if;</span><br><span class="line">    if max_num&lt;zero_today then</span><br><span class="line">        max_num:=zero_today;</span><br><span class="line">    end if;</span><br><span class="line">    if :new.num is null then</span><br><span class="line">    :new.num:=lpad(to_char(to_number(max_num)+1),14,&apos;0&apos;); --递增编号，有14为数字组成</span><br><span class="line">    end if;</span><br><span class="line">when updating(&apos;num&apos;) then--:new、:old都可以用</span><br><span class="line">if :new.num!=:old.num then</span><br><span class="line">      :new.num:=:old.num;</span><br><span class="line">end if;</span><br><span class="line">end case;</span><br><span class="line"></span><br><span class="line">-- Errors handling</span><br><span class="line">exception</span><br><span class="line">    when integrity_error then</span><br><span class="line">       raise_application_error(errno, errmsg); --抛出异常语句</span><br><span class="line">end;</span><br></pre></td></tr></table></figure>

<h2 id="创建有多个执行语句的触发器"><a href="#创建有多个执行语句的触发器" class="headerlink" title="创建有多个执行语句的触发器"></a>创建有多个执行语句的触发器</h2><p><img src="https://img-blog.csdn.net/20180717143550650?watermark/2/text/aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3dlaXhpbl8zOTk0MTI5OA==/font/5a6L5L2T/fontsize/400/fill/I0JBQkFCMA==/dissolve/70" alt="img"></p>
<p>语法：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">DELIMITER |   数据库语句   | DELIMITER；--告诉数据库这时一条语句内容</span><br></pre></td></tr></table></figure>

<p>案例：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">DELIMITER |</span><br><span class="line">create trigger trig_book2 after delete </span><br><span class="line">    on t_book for each row </span><br><span class="line">    begin </span><br><span class="line">          update t_bookType set bookNum = bookNum-1 where old.bookTypeId=t_booktype.id;</span><br><span class="line"> </span><br><span class="line">          insert into t_log values(null,NOW(),&apos;在book表里删除了一条数据&apos;);</span><br><span class="line"> </span><br><span class="line">          delete from t_test where old.bookTypeId = t_test.id;</span><br><span class="line">    end</span><br><span class="line">|</span><br><span class="line">DELIMITER ;</span><br></pre></td></tr></table></figure>

<h2 id="if"><a href="#if" class="headerlink" title="if"></a>if</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">if :new.status=&apos;true&apos; and :new.status=&apos;false&apos;</span><br><span class="line">then</span><br><span class="line"> VERIFY_FIELD_DICT(&apos;ROLE_CONTROL&apos;,&apos;FORMTYPE&apos;,:new.FORMTYPE,&apos;FORMTYPE&apos;);//调用函数</span><br><span class="line">end if;</span><br><span class="line"></span><br><span class="line">is not//不为空</span><br><span class="line">lengthb(:new.attribute) &lt;&gt; 3 //获取长度</span><br><span class="line">substrb(:new.attribute,1,1) not in (&apos;A&apos;,&apos;B&apos;)//获取字符</span><br></pre></td></tr></table></figure>
